# CI: Go formatting, vet, and tests when service modules are present.
name: service-ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Run gofmt check
        run: |
          FILES=$(find services -name '*.go' -type f)
          if [ -n "$FILES" ]; then
            test -z "$(gofmt -l $FILES)"
          else
            echo "No Go files found."
          fi

      - name: Run go vet and tests
        run: |
          set -e
          for MOD in services/*; do
            if [ -f "$MOD/go.mod" ]; then
              (cd "$MOD" && go mod tidy && go vet ./... && go test ./...)
            fi
          done
