# Contract pipeline: DocAI batch (LRO) -> DLP -> Gemini (sync or batch) -> finalize.
# Service URLs and processor name come from user_env_vars set on the workflow.
main:
  params: [event]
  steps:
    - extractInput:
        assign:
          - jobId: ${event.jobId}
          - sourceBucket: ${event.source.bucket}
          - sourceObject: ${event.source.object}
          - sourceGeneration: ${default(map.get(event.source, "generation"), "")}
    - init:
        assign:
          - projectId: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - docaiUrl: ${sys.get_env("DOCAI_SERVICE_URL")}
          - dlpUrl: ${sys.get_env("DLP_SERVICE_URL")}
          - geminiUrl: ${sys.get_env("GEMINI_SERVICE_URL")}
          - finalizeUrl: ${sys.get_env("FINALIZE_SERVICE_URL")}
          - geminiBatchThreshold: ${int(default(sys.get_env("GEMINI_BATCH_CHAR_THRESHOLD"), "200000"))}
    - docAiExtract:
        call: http.post
        args:
          url: ${docaiUrl + "/extract"}
          auth:
            type: OIDC
          body: ${event}
        result: docAiResult
    - piiRedaction:
        call: http.post
        args:
          url: ${dlpUrl}
          auth:
            type: OIDC
          body:
            jobId: ${jobId}
            extractedTextRef: ${docAiResult.body.extractedTextRef}
        result: redactionResult
    - decideGeminiPath:
        switch:
          - condition: ${redactionResult.body.redactedTextLength >= geminiBatchThreshold}
            next: geminiBatchAnalyze
        next: geminiSyncAnalyze
    - geminiSyncAnalyze:
        call: http.post
        args:
          url: ${geminiUrl + "/analyze"}
          auth:
            type: OIDC
          body:
            jobId: ${jobId}
            redactedTextRef: ${redactionResult.body.redactedTextRef}
            redactionApplied: true
            mode: "sync"
        result: geminiResult
        next: finalizeFile
    - geminiBatchAnalyze:
        call: http.post
        args:
          url: ${geminiUrl + "/analyze"}
          auth:
            type: OIDC
          body:
            jobId: ${jobId}
            redactedTextRef: ${redactionResult.body.redactedTextRef}
            redactionApplied: true
            mode: "batch"
        result: geminiBatchStart
    - geminiBatchPoll:
        call: vertexBatchAwait
        args:
          operationName: ${geminiBatchStart.body.operationName}
        result: geminiResult
    - finalizeFile:
        call: http.post
        args:
          url: ${finalizeUrl}
          auth:
            type: OIDC
          body:
            jobId: ${jobId}
            source:
              bucket: ${sourceBucket}
              object: ${sourceObject}
              generation: ${sourceGeneration}
            analysisRef: ${default(map.get(geminiResult, "body"), geminiResult).resultRef}
        result: finalizeResult
    - done:
        return:
          jobId: ${jobId}
          outputUri: ${finalizeResult.body.outputUri}

vertexBatchAwait:
  params: [operationName]
  steps:
    - poll:
        call: googleapis.aiplatform.v1.projects.locations.operations.get
        args:
          name: ${operationName}
        result: op
    - check:
        switch:
          - condition: ${default(map.get(op, "done"), false)}
            next: extractRef
        next: wait
    - wait:
        call: sys.sleep
        args:
          seconds: 10
        next: poll
    - extractRef:
        return:
          body:
            resultRef: ${op.response.outputInfo.gcsOutputDirectory}
